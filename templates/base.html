<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMD-Freelance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rubik', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex items-center justify-between">
            <a href="{% url 'accounts:home' %}" class="text-xl font-bold text-slate-800">
                CMD-<span class="text-cyan-500">Freelance</span>
            </a>
            <div class="flex items-center gap-4 text-sm">
                {% if user.is_authenticated %}
                    <span class="text-slate-500">{{ user.username }}</span>
                    <a href="{% url 'accounts:logout' %}" class="text-rose-500 hover:text-rose-600 font-medium">Déconnexion</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="text-cyan-600 hover:text-cyan-700 font-medium">Connexion</a>
                    <a href="{% url 'accounts:choice_register' %}" class="bg-cyan-500 hover:bg-cyan-600 text-white px-4 py-2 rounded-xl font-medium transition">S'inscrire</a>
                {% endif %}
            </div>
        </div>
    </nav>

    {% if messages %}
    <div class="max-w-4xl mx-auto mt-2 px-4 w-full">
        {% for message in messages %}
            <div class="p-2 rounded-lg text-xs font-medium mb-1 {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200{% else %}bg-rose-50 text-rose-700 border border-rose-200{% endif %}">
                {{ message }}
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-6 text-center text-sm text-slate-500">
        &copy; 2026 SMD-Tech Marketplace. Tous droits réservés.
    </footer>

</body>
</html>
