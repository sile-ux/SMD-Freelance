<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - CMD-Freelance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.lordicon.com/lordicon.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Rubik', sans-serif;
            background: #0b0e1a;
            overflow: hidden;
        }

        .galaxy-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: 0;
        }
        .galaxy-bg .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: nebulaDrift 20s ease-in-out infinite alternate;
        }
        .galaxy-bg .nebula:nth-child(1) {
            width: 600px; height: 600px;
            background: radial-gradient(circle, #6366f1, transparent);
            top: -10%; left: -5%;
        }
        .galaxy-bg .nebula:nth-child(2) {
            width: 500px; height: 500px;
            background: radial-gradient(circle, #8b5cf6, transparent);
            bottom: -15%; right: -5%;
            animation-duration: 25s;
            animation-delay: -5s;
        }
        .galaxy-bg .nebula:nth-child(3) {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #3b82f6, transparent);
            top: 40%; left: 50%;
            animation-duration: 18s;
            animation-delay: -10s;
        }
        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, -40px) scale(1.2); }
        }
        .galaxy-bg .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--d) ease-in-out infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: var(--o1, 0.2); transform: scale(0.8); }
            100% { opacity: var(--o2, 0.9); transform: scale(1.1); }
        }

        .login-wrap {
            position: relative;
            z-index: 1;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            border: 1px solid #dce7f5;
            padding: 40px 44px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 15px 50px rgba(66, 153, 225, 0.10);
        }

        .login-card .logo {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-card .logo lord-icon {
            width: 48px;
            height: 48px;
            margin-bottom: 6px;
        }

        .login-card .logo h1 {
            font-size: 1.4rem;
            font-weight: 800;
            color: #1a365d;
            letter-spacing: -0.3px;
        }

        .login-card .logo h1 span {
            color: #4299e1;
        }

        .login-card .logo p {
            color: #718096;
            font-size: 0.82rem;
            margin-top: 2px;
        }

        .login-card .title {
            margin-bottom: 24px;
        }

        .login-card .title h2 {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a365d;
            margin-bottom: 2px;
        }

        .login-card .title .sub {
            font-size: 0.82rem;
            color: #718096;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1a365d;
            margin-bottom: 5px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 13px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .input-wrap .icon lord-icon {
            width: 18px;
            height: 18px;
        }

        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 42px;
            border: 1.5px solid #dce7f5;
            border-radius: 10px;
            font-family: 'Rubik', sans-serif;
            font-size: 0.9rem;
            transition: 0.15s;
            background: #fafbfc;
        }

        .input-wrap input:focus {
            border-color: #4299e1;
            outline: none;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.08);
        }

        .input-wrap input::placeholder {
            color: #a0aec0;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #4299e1;
            color: #fff;
            font-family: 'Rubik', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            background: #3182ce;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            display: none;
            background: #fed7d7;
            color: #e53e3e;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 16px;
            align-items: center;
            gap: 8px;
        }

        .error-msg.show {
            display: flex;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 18px;
            border-top: 1px solid #edf2f7;
            font-size: 0.85rem;
            color: #718096;
        }

        .footer a {
            color: #4299e1;
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 28px 20px;
                border-radius: 16px;
            }

            .login-card .logo h1 {
                font-size: 1.2rem;
            }

            .login-card .logo lord-icon {
                width: 40px;
                height: 40px;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            animation: fadeInUp 0.4s ease forwards;
        }
    </style>
</head>
<body>

    <div class="login-wrap">

        <div class="login-card">

            <!-- Logo -->
            <div class="logo">
                <lord-icon
                    src="https://cdn.lordicon.com/ktheyllq.json"
                    trigger="loop"
                    colors="primary:#4299e1"
                    style="width:48px;height:48px;">
                </lord-icon>
                <h1>CMD-<span>Freelance</span></h1>
                <p>Plateforme de mise en relation</p>
            </div>

            <div class="title">
                <h2>Connexion</h2>
                <div class="sub">Entrez vos identifiants</div>
            </div>

            {% if messages %}
                {% for message in messages %}
                <div class="error-msg show">
                    <lord-icon src="https://cdn.lordicon.com/uwlzqzys.json" trigger="loop" colors="primary:#e53e3e" style="width:18px;height:18px;flex-shrink:0;"></lord-icon>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            {% endif %}

            <!-- Formulaire -->
            <form method="POST" action="{% url 'accounts:login' %}">
                {% csrf_token %}

                <div class="form-group">
                    <label>Nom d'utilisateur</label>
                    <div class="input-wrap">
                        <span class="icon">
                            <lord-icon src="https://cdn.lordicon.com/npwmqdcn.json" trigger="hover" colors="primary:#718096" style="width:18px;height:18px;"></lord-icon>
                        </span>
                        <input type="text" name="username" placeholder="Votre nom d'utilisateur" required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-wrap">
                        <span class="icon">
                            <lord-icon src="https://cdn.lordicon.com/sspibjsl.json" trigger="hover" colors="primary:#718096" style="width:18px;height:18px;"></lord-icon>
                        </span>
                        <input type="password" name="password" placeholder="Votre mot de passe" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <lord-icon src="https://cdn.lordicon.com/iltqorsz.json" trigger="hover" colors="primary:#ffffff" style="width:18px;height:18px;"></lord-icon>
                    Se connecter
                </button>

            </form>

            <div class="footer">
                Pas encore de compte ? <a href="{% url 'accounts:choice_register' %}">S'inscrire</a>
            </div>

        </div>

    </div>

    <!-- Galaxie de fond -->
    <div class="galaxy-bg" id="galaxyBg">
        <div class="nebula"></div>
        <div class="nebula"></div>
        <div class="nebula"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const container = document.getElementById('galaxyBg');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = 1 + Math.random() * 2.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.setProperty('--d', (2 + Math.random() * 4) + 's');
                star.style.setProperty('--o1', (0.1 + Math.random() * 0.3));
                star.style.setProperty('--o2', (0.5 + Math.random() * 0.5));
                star.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(star);
            }
        });
    </script>
</body>
</html>
