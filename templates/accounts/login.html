{% extends 'base.html' %}

{% block title %}Connexion - SMD-Tech{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-gray-100 my-8">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-gray-900">Bon retour !</h2>
        <p class="text-sm text-gray-500 mt-1">Connectez-vous à votre espace SMD-Tech</p>
    </div>

    <form method="POST" class="space-y-5">
        {% csrf_token %}
        
        <div>
            <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Nom d'utilisateur</label>
            <input type="text" name="username" id="username" required 
                   class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition">
        </div>

        <div>
            <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Mot de passe</label>
            <input type="password" name="password" id="password" required 
                   class="w-full px-4 py-2.5 bg-gray-50 border border-gray-300 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm transition">
        </div>

        <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 shadow-sm transition text-sm mt-2">
            Se connecter
        </button>
    </form>

    <div class="text-center mt-6 pt-6 border-t border-gray-100">
        <p class="text-sm text-gray-500">
            Nouveau sur la plateforme ? 
            <a href="{% url 'choice_register' %}" class="text-indigo-600 font-semibold hover:underline">Créer un compte</a>
        </p>
    </div>
</div>
{% endblock %}
